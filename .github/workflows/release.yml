name: Release Extension

on:
  push:
    tags:
      - 'v*'  # 只在推送 v* 格式的 tag 时触发（如 v0.11.1, v1.0.0）

permissions:
  contents: write  # 需要写权限来创建 release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Get version from tag
        id: version
        run: |
          # 从 tag 中提取版本号（去掉 v 前缀）
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # 使用 Node.js 更新 src/manifest.json 中的版本号
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('src/manifest.json', 'utf8'));
          manifest.version = '$VERSION';
          fs.writeFileSync('src/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "
          echo "Updated manifest.json to version $VERSION"
          cat src/manifest.json | grep version

      - name: Build extension
        run: pnpm run build:zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: extension.zip
          body: |
            🚀 DeepSeek AI Extension ${{ steps.version.outputs.tag }}

            ## 安装说明
            1. 下载下方的 `extension.zip` 文件
            2. 解压缩文件
            3. 在浏览器中打开扩展管理页面
            4. 启用"开发者模式"
            5. 点击"加载已解压的扩展程序"并选择解压后的文件夹

            ## Changelog
            查看完整的更改历史请访问 [Commits](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }})
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
