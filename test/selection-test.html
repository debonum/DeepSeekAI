<html><body style="padding: 50px;"><div>这是测试文本，请选择我然后看看效果。This is test text, please select me and see the effect.</div><script>document.addEventListener("mouseup", function(e) {const selection = window.getSelection(); if(!selection.toString().trim()) return; const container = document.createElement("div"); container.style.position = "absolute"; container.style.left = (e.pageX + 5) + "px"; container.style.top = (e.pageY + 5) + "px"; container.style.zIndex = "2147483647"; container.style.background = "white"; container.style.border = "1px solid #ccc"; container.style.padding = "5px"; container.style.borderRadius = "5px"; container.innerHTML = "🔍查询 📝复制 📋翻译"; const shadow = document.createElement("div"); shadow.style.position = "fixed"; shadow.style.pointerEvents = "none"; shadow.style.top = "0"; shadow.style.left = "0"; shadow.style.width = "100%"; shadow.style.height = "100%"; shadow.style.zIndex = "2147483646"; shadow.attachShadow({ mode: "open" }); shadow.shadowRoot.appendChild(container); container.style.pointerEvents = "auto"; document.body.appendChild(shadow); container.addEventListener("click", function(event) {alert("按钮被点击了，选中文本：" + selection.toString()); event.stopPropagation(); event.preventDefault(); document.body.removeChild(shadow);}); document.addEventListener("mousedown", function(evt) {if(!shadow.contains(evt.target) && !container.contains(evt.target)) {if(document.body.contains(shadow)) {document.body.removeChild(shadow);}}}, { once: true });}); </script></body></html>
